<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gana Ousmane — Capture Chantier Pro</title>
<style>
:root {
  --bg: #0a0f14;
  --panel: rgba(255, 255, 255, 0.05);
  --accent: #10b981; /* Vert plus vif */
  --danger: #ef4444;
  --muted: #94a3b8;
  --white: #ffffff;
}

* { box-sizing: border-box; transition: all 0.2s ease; }

body { 
  margin: 0; 
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
  background: var(--bg); 
  color: var(--white); 
  display: flex; 
  justify-content: center; 
  padding: 20px;
}

.app { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }

@media(max-width: 1024px) { .app { grid-template-columns: 1fr; } }

.panel { 
  background: var(--panel); 
  backdrop-filter: blur(10px); 
  padding: 20px; 
  border-radius: 16px; 
  border: 1px solid rgba(255,255,255,0.1); 
}

.viewport { 
  position: relative; 
  border-radius: 12px; 
  overflow: hidden; 
  background: #000; 
  aspect-ratio: 16/9; 
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

video#preview { width: 100%; height: 100%; object-fit: cover; }

.recording-indicator {
  position: absolute; top: 15px; left: 15px;
  display: none; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px;
  color: #fff; font-size: 12px; font-weight: bold;
}
.dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.logoOverlay { 
  position: absolute; right: 15px; bottom: 15px; 
  width: 20%; max-width: 140px; min-width: 80px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

.controls { display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 20px; }

.btn { 
  padding: 12px 20px; border-radius: 10px; border: 0; 
  background: var(--accent); color: #fff; cursor: pointer; 
  font-weight: 600; display: flex; align-items: center; gap: 8px;
}
.btn:hover { opacity: 0.9; transform: translateY(-2px); }
.btn.secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
.btn.danger { background: var(--danger); }

.bigShutter { 
  width: 70px; height: 70px; border-radius: 50%; border: 5px solid rgba(255,255,255,0.2);
  background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.bigShutter:active { transform: scale(0.9); }

table { width: 100%; border-collapse: collapse; margin-top: 15px; }
th { text-align: left; color: var(--muted); font-size: 12px; text-transform: uppercase; padding: 10px; }
td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

.thumb { width: 80px; height: 50px; object-fit: cover; border-radius: 4px; }

.status-bar { 
  margin-top: 15px; padding: 8px 15px; border-radius: 8px; 
  background: rgba(0,0,0,0.2); font-size: 13px; color: var(--accent);
}

a { color: var(--accent); text-decoration: none; font-weight: 500; cursor: pointer; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="app">
  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
      <div style="display:flex; gap:15px; align-items:center">
        <img id="logoPreview" src="assets/logo.png" alt="Logo" style="height:50px; border-radius:8px; background:#fff; padding:5px">
        <div>
          <div style="font-weight:bold; font-size:18px">Gana Ousmane</div>
          <div style="font-size:13px; color:var(--muted)">Expertise Chantier</div>
        </div>
      </div>
    </div>

    <div class="viewport">
      <div class="recording-indicator" id="recIndicator"><div class="dot"></div> ENREGISTREMENT</div>
      <video id="preview" autoplay playsinline muted></video>
      <img id="overlayLogo" class="logoOverlay" alt="Logo overlay" src="assets/logo.png" style="display:none">
    </div>

    <div class="controls">
      <button class="btn secondary" id="switchCam">🔄 Caméra</button>
      <button class="bigShutter" id="photoBtn" title="Prendre photo"></button>
      <button class="btn" id="videoToggle">🔴 Démarrer Vidéo</button>
    </div>

    <div class="status-bar" id="status">Initialisation du système...</div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0">Médias récents</h3>
    <div style="max-height: 500px; overflow-y: auto;">
      <table id="mediaTable">
        <thead>
          <tr><th>Aperçu</th><th>Action</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div style="margin-top:20px; display:flex; gap:10px">
      <button class="btn" id="downloadAll" style="flex:1">Tout Sauvegarder</button>
      <button class="btn secondary" id="clearAll">Vider</button>
    </div>
  </div>
</div>

<canvas id="captureCanvas" style="display:none"></canvas>

<script>
(async function(){
  const preview = document.getElementById('preview');
  const photoBtn = document.getElementById('photoBtn');
  const videoToggle = document.getElementById('videoToggle');
  const switchCam = document.getElementById('switchCam');
  const statusEl = document.getElementById('status');
  const canvas = document.getElementById('captureCanvas');
  const mediaTableBody = document.querySelector('#mediaTable tbody');
  const recIndicator = document.getElementById('recIndicator');

  let stream = null;
  let useRearCamera = true; 
  let recorder = null;
  let recordedChunks = [];
  let rafId = null;
  let logoImg = new Image();
  const watermarkText = 'GANA OUSMANE - CHANTIER';

  // Charger le logo
  logoImg.src = 'assets/logo.png';
  logoImg.onload = () => { document.getElementById('overlayLogo').style.display = 'block'; };

  async function startStream() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    
    // Configuration pour forcer la caméra arrière sur mobile
    const constraints = {
      video: {
        facingMode: useRearCamera ? { exact: "environment" } : "user",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: true
    };

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch (err) {
      // Si "exact" échoue (sur PC par exemple), on utilise le mode par défaut
      constraints.video.facingMode = useRearCamera ? "environment" : "user";
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    }

    preview.srcObject = stream;
    statusEl.textContent = `Caméra ${useRearCamera ? 'Arrière' : 'Avant'} active`;
  }

  switchCam.addEventListener('click', () => {
    useRearCamera = !useRearCamera;
    startStream();
  });

  function drawWatermark(ctx, w, h) {
    const fontSize = Math.round(w * 0.03);
    ctx.font = `bold ${fontSize}px Arial`;
    
    const dateText = new Date().toLocaleString('fr-FR');
    const fullText = `${watermarkText} | ${dateText}`;
    
    const textWidth = ctx.measureText(fullText).width;
    const padding = 15;
    
    // Fond du texte
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, h - fontSize - 40, textWidth + (padding * 2), fontSize + 20);
    
    // Texte
    ctx.fillStyle = 'white';
    ctx.fillText(fullText, 20 + padding, h - 35);

    // Logo en haut à droite
    if (logoImg.complete) {
      const lW = w * 0.15;
      const lH = lW * (logoImg.height / logoImg.width);
      ctx.globalAlpha = 0.8;
      ctx.drawImage(logoImg, w - lW - 20, 20, lW, lH);
      ctx.globalAlpha = 1.0;
    }
  }

  photoBtn.addEventListener('click', () => {
    const w = preview.videoWidth;
    const h = preview.videoHeight;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    
    ctx.drawImage(preview, 0, 0, w, h);
    drawWatermark(ctx, w, h);
    
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    addMediaRow('📸 Photo', dataUrl);
    statusEl.textContent = "Photo capturée !";
  });

  videoToggle.addEventListener('click', () => {
    if (recorder && recorder.state === 'recording') {
      recorder.stop();
      videoToggle.textContent = '🔴 Démarrer Vidéo';
      videoToggle.classList.remove('danger');
      recIndicator.style.display = 'none';
      cancelAnimationFrame(rafId);
    } else {
      startRecording();
    }
  });

  function startRecording() {
    recordedChunks = [];
    const w = preview.videoWidth;
    const h = preview.videoHeight;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');

    function loop() {
      ctx.drawImage(preview, 0, 0, w, h);
      drawWatermark(ctx, w, h);
      rafId = requestAnimationFrame(loop);
    }
    loop();

    const canvasStream = canvas.captureStream(30);
    const audioTracks = stream.getAudioTracks();
    if (audioTracks.length) canvasStream.addTrack(audioTracks[0]);

    recorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
    recorder.ondataavailable = e => recordedChunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      addMediaRow('🎥 Vidéo', URL.createObjectURL(blob));
    };

    recorder.start();
    videoToggle.textContent = '⏹ Arrêter';
    videoToggle.classList.add('danger');
    recIndicator.style.display = 'flex';
  }

  function addMediaRow(type, url) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><img src="${url}" class="thumb"></td>
      <td>
        <div style="font-weight:bold">${type}</div>
        <a href="${url}" download="Gana_${Date.now()}">Télécharger</a>
      </td>
    `;
    mediaTableBody.prepend(tr);
  }

  document.getElementById('clearAll').onclick = () => mediaTableBody.innerHTML = '';
  document.getElementById('downloadAll').onclick = () => {
    mediaTableBody.querySelectorAll('a').forEach(a => a.click());
  };

  await startStream();
})();
</script>
</body>
</html>
