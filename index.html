<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10b981">

<title>Gana Ousmane — Capture Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f14;
color:#fff;
}

h2{text-align:center;}

video{
width:100%;
max-height:60vh;
background:black;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin:15px;
flex-wrap:wrap;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.photo{background:#10b981;color:#fff;}
.video{background:#ef4444;color:#fff;}
.switch{background:#333;color:#fff;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid rgba(255,255,255,0.1);
padding:8px;
text-align:center;
}

th{
background:#111;
}

img,video.preview{
width:100px;
border-radius:5px;
}

canvas{display:none;}
</style>
</head>

<body>

<h2>📸 GANA OUSMANE</h2>

<video id="video" autoplay playsinline muted></video>

<div class="controls">
<button class="switch" onclick="switchCamera()">🔄 Caméra</button>
<button class="photo" onclick="takePhoto()">📸 Photo</button>
<button class="video" onclick="toggleVideo()" id="videoBtn">🎥 Vidéo</button>
</div>

<canvas id="canvas"></canvas>

<table>
<thead>
<tr>
<th>Aperçu</th>
<th>Nom</th>
<th>Date</th>
<th>Lieu</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let table = document.getElementById("tableBody");

let stream;
let recorder;
let chunks=[];
let recording=false;
let facing="environment";

let locationText="Localisation...";

// CAMERA
async function startCamera(){
try{
if(stream) stream.getTracks().forEach(t=>t.stop());

stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing},
audio:true
});

video.srcObject = stream;

}catch(e){
alert("Erreur caméra : "+e.message);
}
}

function switchCamera(){
facing = facing==="environment"?"user":"environment";
startCamera();
}

// DATE
function getDate(){
let now = new Date();
return now.toLocaleString();
}

// GPS
function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async (pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

try{
let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
let data = await res.json();

locationText =
data.address.city ||
data.address.town ||
data.address.village ||
data.address.suburb ||
"Lieu inconnu";

}catch(e){
locationText = "GPS actif";
}

});
}else{
locationText="GPS non dispo";
}
}

// WATERMARK
function drawWatermark(){
let txt1="GANA OUSMANE";
let txt2=getDate();
let txt3=locationText;

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,canvas.height-80,canvas.width,80);

ctx.fillStyle="white";
ctx.font="18px Arial";

ctx.fillText(txt1,10,canvas.height-50);
ctx.fillText(txt2,10,canvas.height-30);
ctx.fillText(txt3,10,canvas.height-10);
}

// TABLE
function addRow(url,name,type){
let row=document.createElement("tr");

row.innerHTML=`
<td>${type==="video" ? `<video src="${url}" class="preview" controls></video>` : `<img src="${url}">`}</td>
<td>${name}</td>
<td>${getDate()}</td>
<td>${locationText}</td>
<td>
<button onclick="download('${url}','${name}')">💾</button>
<button onclick="this.parentElement.parentElement.remove()">🗑️</button>
</td>
`;

table.prepend(row);
}

// DOWNLOAD
function download(url,name){
let a=document.createElement("a");
a.href=url;
a.download=name;
a.click();
}

// PHOTO
function takePhoto(){
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);
drawWatermark();

canvas.toBlob(blob=>{
let url=URL.createObjectURL(blob);
let name="photo_"+Date.now()+".jpg";

addRow(url,name,"photo");
download(url,name);
});
}

// VIDEO
function toggleVideo(){

if(recording){
recorder.stop();
recording=false;
document.getElementById("videoBtn").innerText="🎥 Vidéo";
return;
}

chunks=[];

recorder=new MediaRecorder(stream);

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{
let blob=new Blob(chunks,{type:"video/webm"});
let url=URL.createObjectURL(blob);
let name="video_"+Date.now()+".webm";

addRow(url,name,"video");
download(url,name);
};

recorder.start();
recording=true;
document.getElementById("videoBtn").innerText="⛔ Stop";
}

// SERVICE WORKER
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

// START
getLocation();
startCamera();
</script>

</body>
</html>
